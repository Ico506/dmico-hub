<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMICO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ── Login view ─────────────────────────────────────────── -->
  <main id="login-view" class="login" hidden>
    <div class="login-card">
      <div class="mark">DMICO</div>
      <p class="mark-sub">a quiet place to see your life</p>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
      </div>

      <button id="sign-in" class="btn-primary">Sign in</button>
      <p id="login-msg" class="msg" role="status" aria-live="polite"></p>
    </div>
    <p class="login-foot">Private hub · only you can be here</p>
  </main>

  <!-- ── App view ───────────────────────────────────────────── -->
  <div id="app-view" class="app" hidden>
    <aside class="rail">
      <div class="rail-head">
        <div class="mark mark-sm">DMICO</div>
        <div class="rail-tag">life os</div>
      </div>

      <nav id="modules" class="modules" aria-label="Modules"></nav>

      <div class="rail-foot">
        <button id="sign-out" class="btn-ghost">Sign out</button>
      </div>
    </aside>

    <section class="stage">
      <header class="stage-top">
        <h1 id="greeting" class="greeting">Welcome</h1>
        <span id="module-eyebrow" class="eyebrow"></span>
      </header>
      <div id="stage-body" class="stage-body"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="research.js"></script>
  <script src="self-study.js"></script>
  <script src="app.js"></script>
</body>
</html>
